<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#4f46e5"/>
  
  <!-- Credit card shape -->
  <rect x="100" y="170" width="312" height="195" rx="20" ry="20" fill="#ffffff"/>
  
  <!-- Card magnetic stripe -->
  <rect x="100" y="210" width="312" height="40" fill="#1f2937"/>
  
  <!-- Card chip -->
  <rect x="130" y="270" width="50" height="38" rx="6" ry="6" fill="#f59e0b"/>
  <line x1="130" y1="289" x2="180" y2="289" stroke="#92400e" stroke-width="2"/>
  <line x1="155" y1="270" x2="155" y2="308" stroke="#92400e" stroke-width="2"/>
  
  <!-- Baht symbol -->
  <text x="330" y="330" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#4f46e5" text-anchor="middle">&#xe3f;</text>
</svg>
